name: Security Scan

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            working-directory: .
          - name: backend
            working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install Dependencies (${{ matrix.name }})
        run: npm ci --no-audit --no-fund
        working-directory: ${{ matrix.working-directory }}

      - name: Run Audit (${{ matrix.name }})
        shell: bash
        run: |
          attempt=1
          max_attempts=3
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Running npm audit (attempt ${attempt}/${max_attempts})..."
            if npm audit --audit-level=high; then
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "npm audit failed; retrying in 10 seconds..."
              sleep 10
            fi
            attempt=$((attempt + 1))
          done
          echo "npm audit failed after ${max_attempts} attempts."
          exit 1
        working-directory: ${{ matrix.working-directory }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
